apiVersion: v1
kind: Pod
metadata:
  name: app-pod
spec:
  volumes:
  - name: data
    persistentVolumeClaim:
      claimName: hello-pvc
  containers:
  - name: hello-kube
    image: hellokubeacr{random}.azurecr.io/hello-kube:1.2 # Replace {random} with real value
    volumeMounts:
    - name: data
      mountPath: /configuration
  imagePullSecrets:
  - name: acr-secret