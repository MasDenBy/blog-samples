apiVersion: apps/v1
kind: Deployment
metadata:
  name: hello-kube-api-deploy
spec:
  replicas: 2
  selector:
    matchLabels:
      app: hello-kube-api
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
      maxSurge: 1
  template:
    metadata:
      labels:
        app: hello-kube-api
    spec:
      volumes:
      - name: data
        persistentVolumeClaim:
          claimName: hello-pvc
      containers:
      - name: hello-kube-api
        image: hellokubeacr{random}.azurecr.io/hello-kube-api:1.0 # Replace {random} with real value
        ports:
        - containerPort: 8080
        volumeMounts:
        - name: data
          mountPath: /configuration
      imagePullSecrets:
      - name: acr-secret